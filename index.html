<script>
const API_KEY = "AIzaSyAbx-fwPo_eUaqA7uPypwog6h_shPP5b_A"; // get from https://aistudio.google.com/app/apikey

async function getAIReply(msg) {
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          contents: [
            {
              parts: [
                {
                  text: `You are NIRF Assistant for SKR & SKR GCW(A), Kadapa, Andhra Pradesh, India.
Principal: Dr V Saleem Basha
IQAC/NIRF Coordinator: Dr C V Krishnaveni.

Answer clearly about NIRF 2025.\n\nUser: ${msg}`
                }
              ]
            }
          ]
        })
      }
    );

    const data = await response.json();

    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";

  } catch (error) {
    return "Error connecting to AI. Check API key.";
  }
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  addMessage("Typing...", "bot");

  const reply = await getAIReply(text);

  document.querySelector(".bot:last-child").innerText = reply;
}

function addMessage(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function handleKey(e) {
  if (e.key === "Enter") send();
}
</script>
