<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NIRF Chatbot</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }
header { background:black; color:white; padding:15px; font-size:24px; }
#chat { height:70vh; overflow-y:auto; padding:20px; background:white; }
.msg { padding:10px; margin:8px; border-radius:6px; max-width:70%; }
.user { background:black; color:white; margin-left:auto; }
.bot { background:#e8f5ee; }
#inputArea { display:flex; padding:10px; background:#ddd; }
input { flex:1; padding:10px; font-size:16px; }
button { padding:10px; background:green; color:white; border:none; }
footer { background:black; color:white; text-align:center; padding:8px; }
</style>

</head>

<body>

<header>
NIRF Assistant – SKR & SKR GCW(A)
</header>

<div id="chat">
  <div class="msg bot">
    Hello! AI chatbot ready. Ask about NIRF 2025.
  </div>
</div>

<div id="inputArea">
  <input id="input" placeholder="Ask..." onkeypress="if(event.key==='Enter') send()">
  <button onclick="send()">Send</button>
</div>

<footer>
© Dr C V Krishnaveni
</footer>

<script>

// ⚠️ PUT YOUR KEY HERE
const API_KEY = "PASTE_YOUR_KEY_HERE";

// fallback demo (important)
function demoReply(msg){
  return "AI not connected. Demo reply: Ask about TLR, RP, GO.";
}

async function aiReply(msg){
  try{
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          contents:[{
            parts:[{
              text:`You are NIRF assistant for SKR & SKR GCW(A), Kadapa.
Principal: Dr V Saleem Basha
Coordinator: Dr C V Krishnaveni

Answer:\n${msg}`
            }]
          }]
        })
      }
    );

    const data = await res.json();

    return data?.candidates?.[0]?.content?.parts?.[0]?.text || demoReply(msg);

  }catch(e){
    return demoReply(msg);
  }
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;

  addMsg(text,"user");
  input.value="";

  addMsg("Typing...","bot");

  const reply = await aiReply(text);

  document.querySelector(".bot:last-child").innerText = reply;
}

function addMsg(t,type){
  const d=document.createElement("div");
  d.className="msg "+type;
  d.innerText=t;
  document.getElementById("chat").appendChild(d);
}

</script>

</body>
</html>
